services:
  db:
    image: postgres:16
    container_name: taskboard-db
    restart: always
    environment:
      POSTGRES_USER: taskboard
      POSTGRES_PASSWORD: taskboard123
      POSTGRES_DB: taskboard
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  app:
    build: .
    container_name: taskboard-app
    depends_on:
      - db
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://taskboard:taskboard123@db:5432/taskboard
      JWT_SECRET: mysupersecretkey123
    ports:
      - "3000:3000"
    restart: always


    
volumes:
  db_data: